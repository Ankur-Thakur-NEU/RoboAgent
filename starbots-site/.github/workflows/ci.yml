name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: starbots-site/package-lock.json
      - name: Install
        run: npm ci
        working-directory: starbots-site
      - name: Audit
        run: npm audit --audit-level=high
        working-directory: starbots-site
      - name: Lint
        run: npm run lint
        working-directory: starbots-site
      - name: Test
        run: npm run test
        working-directory: starbots-site
      - name: Build
        run: npm run build
        working-directory: starbots-site
